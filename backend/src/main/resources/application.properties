# ── Environment Variables ────────────────────────────────────────────────────
spring.config.import=optional:file:.env

spring.application.name=backend

# ── PostgreSQL DataSource ────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:ncafe}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Static Resources ─────────────────────────────────────────────────────────
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=file:./upload/, classpath:/static/

# ── JWT : Access Token ───────────────────────────────────────────────────────
# 운영 환경에서는 반드시 JWT_SECRET 환경변수로 교체하세요 (32자 이상 랜덤 문자열)
jwt.secret=${JWT_SECRET}
# Access Token 유효 시간: 30분 (ms)
jwt.expiration=${JWT_EXPIRATION_MS:1800000}

# ── JWT : Refresh Token ──────────────────────────────────────────────────────
# Refresh Token 유효 기간: 7일
jwt.refresh.expiration.days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# ── Admin Credentials ────────────────────────────────────────────────────────
# 운영 환경에서는 반드시 ADMIN_USERNAME, ADMIN_PASSWORD 환경변수로 설정하세요
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}