name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-yj-cafe}" > .env
          echo "USER_ID=${USER_ID:-yj-dev}" >> .env
          echo "BACKEND_PORT=${BACKEND_PORT:-8065}" >> .env
          echo "FRONTEND_PORT=${FRONTEND_PORT:-3065}" >> .env
          echo "DB_PORT=${DB_PORT:-5433}" >> .env
          echo "SESSION_SECRET=${SESSION_SECRET:-ea78b9775aeded53fdf6ae11a3219db6}" >> .env
          echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
          echo "JWT_SECRET=${JWT_SECRET}" >> .env
          echo "ADMIN_USERNAME=${ADMIN_USERNAME}" >> .env
          echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}" >> .env

          echo "FRONTEND_IMAGE=yj-ncafe-frontend:latest" >> .env
          echo "BACKEND_IMAGE=yj-ncafe-backend:latest" >> .env
        env:
          COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME }}
          USER_ID: ${{ secrets.USER_ID }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Build and Deploy
        run: docker compose --profile with-db up --build -d

      - name: Verify deployment
        run: |
          echo "=== Container Status ==="
          docker compose ps
          sleep 15
          echo ""
          echo "=== Health Check ==="
          curl -sf --max-time 10 -o /dev/null -w "Backend  : HTTP %{http_code}\n" http://localhost:${BACKEND_PORT:-8065} || echo "Backend  : not responding"
          curl -sf --max-time 10 -o /dev/null -w "Frontend : HTTP %{http_code}\n" http://localhost:${FRONTEND_PORT:-3065} || echo "Frontend : not responding"
        env:
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}

      - name: Clean up old images
        run: docker image prune -f
